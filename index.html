<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDFラベルメーカー</title>
<!-- jsPDFライブラリをCDNから読み込む -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  body {
    font-family: sans-serif;
    max-width: 480px;
    margin: 40px auto;
    padding: 0 16px;
    color: #222;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 24px;
  }
  fieldset {
    border: 1px solid #ccc;
    border-radius: 4px;
    margin-bottom: 16px;
  }
  legend {
    font-weight: bold;
    padding: 0 4px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .row label {
    flex: 0 0 140px;
  }
  .row input,
  .row select {
    flex: 1;
    padding: 4px;
  }
  .row span {
    color: #666;
    font-size: 12px;
  }
  textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 6px;
    font-size: 14px;
  }
  #error {
    color: #c00;
    margin-bottom: 16px;
    white-space: pre-wrap;
  }
  button {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>PDFラベルメーカー</h1>

<!-- エラーメッセージ表示欄 -->
<div id="error"></div>

<form id="labelForm">

  <fieldset>
    <legend>用紙プリセット</legend>
    <div class="row">
      <label for="paperPreset">プリセット</label>
      <select id="paperPreset">
        <option value="custom">カスタム</option>
        <option value="a4-72">A4 72面</option>
        <option value="a4-24">A4 24面</option>
        <option value="a4-44">A4 44面</option>
      </select>
    </div>
  </fieldset>

  <fieldset>
    <legend>印字するテキスト</legend>
    <textarea id="labelText" rows="4" placeholder="すべてのラベルに印字する内容を入力してください"></textarea>
  </fieldset>

  <fieldset>
    <legend>用紙の余白 (mm)</legend>
    <div class="row">
      <label for="marginTop">上</label>
      <input type="number" id="marginTop" value="10" step="0.1">
    </div>
    <div class="row">
      <label for="marginBottom">下</label>
      <input type="number" id="marginBottom" value="10" step="0.1">
    </div>
    <div class="row">
      <label for="marginLeft">左</label>
      <input type="number" id="marginLeft" value="10" step="0.1">
    </div>
    <div class="row">
      <label for="marginRight">右</label>
      <input type="number" id="marginRight" value="10" step="0.1">
    </div>
  </fieldset>

  <fieldset>
    <legend>ラベルサイズ (mm)</legend>
    <div class="row">
      <label for="labelWidth">幅</label>
      <input type="number" id="labelWidth" value="40" step="0.1">
    </div>
    <div class="row">
      <label for="labelHeight">高さ</label>
      <input type="number" id="labelHeight" value="20" step="0.1">
    </div>
  </fieldset>

  <fieldset>
    <legend>ラベル間の余白 (mm)</legend>
    <div class="row">
      <label for="gapX">横方向</label>
      <input type="number" id="gapX" value="2" step="0.1">
    </div>
    <div class="row">
      <label for="gapY">縦方向</label>
      <input type="number" id="gapY" value="2" step="0.1">
    </div>
  </fieldset>

  <!-- プレビュー表示欄(未実装) -->
  <fieldset>
    <legend>プレビュー</legend>
    <div id="preview"></div>
  </fieldset>

  <button type="button" id="createPdfButton">PDFを作成</button>

</form>

<script>
  // 用紙サイズ(A4, mm)
  const PAPER_WIDTH = 210;
  const PAPER_HEIGHT = 297;

  // 日本語フォント(Noto Sans JP)の配布元。初回のみ取得しBase64化してキャッシュする
  const JP_FONT_URL = 'https://raw.githubusercontent.com/google/fonts/main/ofl/notosansjp/NotoSansJP%5Bwght%5D.ttf';
  const JP_FONT_NAME = 'NotoSansJP';
  let jpFontBase64Cache = null;

  // 用紙プリセット定義(mm)。カスタムは自動入力を行わない
  const PAPER_PRESETS = {
    'a4-72': {
      marginTop: 10.2, marginBottom: 10.2, marginLeft: 7.6, marginRight: 7.6,
      labelWidth: 25.4, labelHeight: 10, gapX: 2.54, gapY: 0,
    },
    'a4-24': {
      marginTop: 13.5, marginBottom: 12.6, marginLeft: 6.8, marginRight: 6.8,
      labelWidth: 64.3, labelHeight: 33.9, gapX: 0, gapY: 0,
    },
    'a4-44': {
      marginTop: 10.6, marginBottom: 10.6, marginLeft: 6.4, marginRight: 6.4,
      labelWidth: 48.3, labelHeight: 25.4, gapX: 0, gapY: 0,
    },
  };

  const errorEl = document.getElementById('error');
  const createPdfButton = document.getElementById('createPdfButton');
  const paperPresetSelect = document.getElementById('paperPreset');

  // プリセット選択時に余白・ラベルサイズ・ラベル間余白を自動入力する(選択後も手動で微調整可能)
  function applyPaperPreset(presetKey) {
    const preset = PAPER_PRESETS[presetKey];
    if (!preset) {
      return;
    }
    document.getElementById('marginTop').value = preset.marginTop;
    document.getElementById('marginBottom').value = preset.marginBottom;
    document.getElementById('marginLeft').value = preset.marginLeft;
    document.getElementById('marginRight').value = preset.marginRight;
    document.getElementById('labelWidth').value = preset.labelWidth;
    document.getElementById('labelHeight').value = preset.labelHeight;
    document.getElementById('gapX').value = preset.gapX;
    document.getElementById('gapY').value = preset.gapY;
  }

  paperPresetSelect.addEventListener('change', () => {
    applyPaperPreset(paperPresetSelect.value);
  });

  function showError(message) {
    errorEl.textContent = message;
  }

  function clearError() {
    errorEl.textContent = '';
  }

  // ArrayBufferをBase64文字列に変換する(巨大なフォントでもスタックオーバーフローしないよう分割処理する)
  function arrayBufferToBase64(buffer) {
    let binary = '';
    const bytes = new Uint8Array(buffer);
    const chunkSize = 0x8000;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      const chunk = bytes.subarray(i, i + chunkSize);
      binary += String.fromCharCode.apply(null, chunk);
    }
    return btoa(binary);
  }

  // 日本語フォントをCDNから取得してBase64化する(2回目以降はキャッシュを返す)
  async function loadJapaneseFontBase64() {
    if (jpFontBase64Cache) {
      return jpFontBase64Cache;
    }
    const response = await fetch(JP_FONT_URL);
    if (!response.ok) {
      throw new Error('日本語フォントの取得に失敗しました');
    }
    const buffer = await response.arrayBuffer();
    jpFontBase64Cache = arrayBufferToBase64(buffer);
    return jpFontBase64Cache;
  }

  // フォームの入力値を数値化して取得する
  function getFormValues() {
    return {
      marginTop: parseFloat(document.getElementById('marginTop').value),
      marginBottom: parseFloat(document.getElementById('marginBottom').value),
      marginLeft: parseFloat(document.getElementById('marginLeft').value),
      marginRight: parseFloat(document.getElementById('marginRight').value),
      labelWidth: parseFloat(document.getElementById('labelWidth').value),
      labelHeight: parseFloat(document.getElementById('labelHeight').value),
      gapX: parseFloat(document.getElementById('gapX').value),
      gapY: parseFloat(document.getElementById('gapY').value),
      text: document.getElementById('labelText').value,
    };
  }

  // 入力値を検証する。問題があればエラーメッセージ文字列を、問題なければnullを返す
  function validateInputs(values) {
    // 用紙の余白・ラベルサイズは0より大きい値が必須
    const positiveFields = [
      ['上余白', values.marginTop],
      ['下余白', values.marginBottom],
      ['左余白', values.marginLeft],
      ['右余白', values.marginRight],
      ['ラベルの幅', values.labelWidth],
      ['ラベルの高さ', values.labelHeight],
    ];
    for (const [label, value] of positiveFields) {
      if (!Number.isFinite(value) || value <= 0) {
        return `${label}には0より大きい数値を入力してください。`;
      }
    }

    // ラベル間の余白はラベル同士を隙間なく配置できるよう0を許可する
    const nonNegativeFields = [
      ['ラベル間の横方向余白', values.gapX],
      ['ラベル間の縦方向余白', values.gapY],
    ];
    for (const [label, value] of nonNegativeFields) {
      if (!Number.isFinite(value) || value < 0) {
        return `${label}には0以上の数値を入力してください。`;
      }
    }

    if (!values.text.trim()) {
      return '印字するテキストを入力してください。';
    }

    const availableWidth = PAPER_WIDTH - values.marginLeft - values.marginRight;
    const availableHeight = PAPER_HEIGHT - values.marginTop - values.marginBottom;

    if (availableWidth <= 0 || availableHeight <= 0) {
      return '左右または上下の余白の合計が用紙サイズを超えています。';
    }
    if (values.labelWidth > availableWidth || values.labelHeight > availableHeight) {
      return 'ラベルサイズが大きすぎて用紙に配置できません。';
    }

    const { cols, rows } = calculateGrid(values, availableWidth, availableHeight);
    if (cols < 1 || rows < 1) {
      return '指定した設定ではラベルを1つも配置できません。';
    }

    return null;
  }

  // 余白・ラベルサイズ・ラベル間余白から、配置できる列数・行数を計算する
  function calculateGrid(values, availableWidth, availableHeight) {
    const cols = Math.floor((availableWidth + values.gapX) / (values.labelWidth + values.gapX));
    const rows = Math.floor((availableHeight + values.gapY) / (values.labelHeight + values.gapY));
    return { cols, rows };
  }

  // ラベル1つ分のテキストを、枠内に収まるフォントサイズで左上揃えに描画する
  function drawLabelText(doc, text, boxX, boxY, boxWidth, boxHeight) {
    const paddingMm = 2;
    const maxWidth = Math.max(boxWidth - paddingMm * 2, 1);
    const maxHeight = Math.max(boxHeight - paddingMm * 2, 1);
    const maxFontSize = 14;
    const minFontSize = 4;
    const lineHeightRatio = 1.3;
    const ptToMm = 0.3528;

    const lines = text.split('\n');
    let fontSize = maxFontSize;

    for (; fontSize > minFontSize; fontSize -= 0.5) {
      doc.setFontSize(fontSize);
      const lineHeightMm = fontSize * ptToMm * lineHeightRatio;
      const blockHeight = lines.length * lineHeightMm;
      const widestLineWidth = Math.max(...lines.map((line) => doc.getTextWidth(line)));
      if (blockHeight <= maxHeight && widestLineWidth <= maxWidth) {
        break;
      }
    }

    doc.setFontSize(fontSize);
    const lineHeightMm = fontSize * ptToMm * lineHeightRatio;
    const textX = boxX + paddingMm;
    let y = boxY + paddingMm;

    lines.forEach((line) => {
      doc.text(line, textX, y, { align: 'left', baseline: 'top' });
      y += lineHeightMm;
    });
  }

  // 用紙いっぱいに同じテキストのラベルを配置したPDFを生成する
  async function createPdf() {
    clearError();
    const values = getFormValues();
    const errorMessage = validateInputs(values);
    if (errorMessage) {
      showError(errorMessage);
      return;
    }

    const originalButtonLabel = createPdfButton.textContent;
    createPdfButton.disabled = true;
    createPdfButton.textContent = '日本語フォントを読み込み中...';

    try {
      const fontBase64 = await loadJapaneseFontBase64();

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      // 日本語フォントをjsPDFに埋め込む(埋め込まないと文字化けするため)
      doc.addFileToVFS('NotoSansJP.ttf', fontBase64);
      doc.addFont('NotoSansJP.ttf', JP_FONT_NAME, 'normal');
      doc.setFont(JP_FONT_NAME);

      const availableWidth = PAPER_WIDTH - values.marginLeft - values.marginRight;
      const availableHeight = PAPER_HEIGHT - values.marginTop - values.marginBottom;
      const { cols, rows } = calculateGrid(values, availableWidth, availableHeight);

      // 割り切れずに余った分の余白を左右・上下に均等に振り分け、ラベル全体を中央揃えにする
      const gridWidth = cols * values.labelWidth + (cols - 1) * values.gapX;
      const gridHeight = rows * values.labelHeight + (rows - 1) * values.gapY;
      const startX = values.marginLeft + (availableWidth - gridWidth) / 2;
      const startY = values.marginTop + (availableHeight - gridHeight) / 2;

      doc.setDrawColor(150);
      doc.setLineWidth(0.1);

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const x = startX + col * (values.labelWidth + values.gapX);
          const y = startY + row * (values.labelHeight + values.gapY);

          // 切り取り線の目安として枠線を描画する
          doc.rect(x, y, values.labelWidth, values.labelHeight, 'S');

          drawLabelText(
            doc,
            values.text,
            x,
            y,
            values.labelWidth,
            values.labelHeight
          );
        }
      }

      doc.save('labels.pdf');
    } catch (error) {
      showError('PDFの生成中にエラーが発生しました。' + error.message);
    } finally {
      createPdfButton.disabled = false;
      createPdfButton.textContent = originalButtonLabel;
    }
  }

  createPdfButton.addEventListener('click', createPdf);
</script>

</body>
</html>
